name: Build & Test

on: push

jobs:
  matrix:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        version: [8, 11, 17, 20, 21]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.version }}
        distribution: 'temurin'
        cache: 'sbt'
    - name: Compile
      run: sbt compile
    - name: Package
      run: sbt package
    - name: Test
      run: sbt test
